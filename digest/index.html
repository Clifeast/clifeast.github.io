<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>论文日报</title>
  <meta name="description" content="算法博弈论与 AI 论文日报。" />
  <link rel="icon" type="image/png" href="/assets/images/profileblack.png" />
  <link rel="stylesheet" href="/assets/styles/general.css" />
  <link rel="stylesheet" href="/assets/styles/index.css" />
  <link rel="stylesheet" href="/assets/styles/digest.css" />
  <script defer src="/assets/scripts/layout.js"></script>
  <script defer src="/assets/scripts/digest.js" data-digest-path="/data/digest/today.json"
    data-digest-index-path="/data/digest/index.json"></script>
</head>

<body>
  <div class="page digest-page">
    <header class="site-header" data-component="site-header"></header>

    <main class="digest-content">
      <section class="digest-hero" aria-labelledby="digest-title">
        <div class="digest-hero__copy">
          <h1 id="digest-title">论文日报</h1>
          <p class="digest-date" id="digest-date">今天日期</p>
        </div>
        <div class="digest-picker" aria-label="选择日报日期">
          <button class="digest-picker__trigger" id="digest-picker-trigger" type="button" aria-expanded="false"
            aria-controls="digest-picker-popover">选择日期</button>
          <div class="digest-picker__popover" id="digest-picker-popover" hidden>
            <button class="digest-picker__today" id="digest-today-button" type="button">今日简报</button>
            <div class="digest-calendar" id="digest-calendar" aria-label="历史简报日历"></div>
          </div>
        </div>
      </section>

      <div class="digest-status" id="digest-status" role="status">正在读取今日论文数据...</div>
      <section class="digest-sections" id="digest-sections" aria-live="polite"></section>
    </main>

    <footer class="site-footer" data-component="site-footer"></footer>
  </div>
</body>

</html>
