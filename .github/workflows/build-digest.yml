name: Build daily digest

on:
  schedule:
    # UTC 02:30 = Asia/Shanghai 10:30. arXiv announcements land on
    # Beijing-time weekday mornings, so weekdays are enough here.
    - cron: "30 2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-digest
  cancel-in-progress: false

jobs:
  build-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build digest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          QWEN_SCORE_MODEL: qwen-plus
          QWEN_ENRICH_MODEL: qwen-long
          QWEN_API_BASE: https://dashscope.aliyuncs.com/compatible-mode/v1
        run: npm run build:digest -- --timezone Asia/Shanghai

      - name: Commit digest update
        run: |
          if [ -z "$(git status --porcelain data/digest)" ]; then
            echo "No digest changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/digest
          git commit -m "自动更新论文日报"
          git push
