<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文章 - Heyang Shang</title>
    <link rel="icon" type="image/png" href="image/profileblack.png">
    <link rel="stylesheet" href="../styles/general.css">
    <link rel="stylesheet" href="../styles/index.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="../index.html">
            <img src="../image/profilename.png" alt="Heyang Shang">
        </a>
        <nav class="site-nav">
            <button class="nav-button" onclick="location.href='../index.html';">返回主页</button>
        </nav>
    </header>

    <main class="site-main">
        <section class="content-section">
            <h2>我的文章</h2>
            <p>按时间排序的最新文章，点击进入查看全文。</p>
            <ul class="article-list" id="article-list"></ul>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2024 Heyang Shang. 保留所有权利。</p>
    </footer>

    <script>
        fetch('../articles.json')
            .then(response => response.json())
            .then(data => {
                const articleList = document.getElementById('article-list');
                data.forEach(article => {
                    const item = document.createElement('li');
                    item.classList.add('article-card');

                    const info = document.createElement('div');
                    info.classList.add('article-card__info');

                    const title = document.createElement('h3');
                    title.classList.add('article-title');
                    title.textContent = article.title;

                    const meta = document.createElement('span');
                    meta.classList.add('article-date');
                    meta.textContent = article.date;

                    info.append(title, meta);

                    if (article.description) {
                        const description = document.createElement('p');
                        description.classList.add('article-description');
                        description.textContent = article.description;
                        info.appendChild(description);
                    }

                    const button = document.createElement('button');
                    button.classList.add('nav-button');
                    button.textContent = '查看全文';
                    button.addEventListener('click', () => {
                        location.href = article.link;
                    });

                    item.append(info, button);
                    articleList.appendChild(item);
                });
            })
            .catch(error => console.error('Error loading articles:', error));
    </script>
</body>

</html>
