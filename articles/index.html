<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文章列表 · 赏鹤阳</title>
  <meta name="description" content="赏鹤阳的文章索引，浏览全部博文。" />
  <link rel="icon" type="image/png" href="/assets/images/profileblack.png" />
  <link rel="stylesheet" href="/assets/styles/general.css" />
  <link rel="stylesheet" href="/assets/styles/index.css" />
  <link rel="stylesheet" href="/assets/styles/article-list.css" />
  <script defer src="/assets/scripts/layout.js"></script>
  <script defer src="/assets/scripts/articles.js" data-articles-path="/data/articles.json"></script>
</head>

<body>
  <div class="list-page">
    <header class="site-header" data-component="site-header"></header>

    <main class="list-content">
      <h1 class="page-title">全部文章</h1>
      <p class="page-description">
        所有文章按照发布时间顺序排列。点击卡片即可跳转到对应的全文页面。
      </p>

      <div class="article-feed" id="article-feed" data-articles-view="list">
        <article class="card article-card">
          <div class="article-card__header">
            <h2 class="article-card__title">加载中…</h2>
            <span class="article-card__meta">正在获取文章数据</span>
          </div>
          <p class="article-card__description">
            如果长时间未加载，请刷新页面或稍后再试。
          </p>
          <div class="article-card__actions" aria-hidden="true">
            <span class="article-card__meta">敬请期待</span>
          </div>
        </article>
      </div>
    </main>

    <footer class="site-footer" data-component="site-footer"></footer>
  </div>
</body>

</html>
